<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | WebExample</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">

    <script src="https://www.gstatic.com/firebasejs/9.14.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.14.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.14.0/firebase-firestore-compat.js"></script>

    <script>
      // CONFIGURACIÓN FINAL CORREGIDA
      const firebaseConfig = {
      apiKey: "AIzaSyANaUA6pRZ5i2zrGrydYfr253EGCbBRcCg",
      authDomain: "webexample-cbd69.firebaseapp.com",
      databaseURL: "https://webexample-cbd69-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "webexample-cbd69",
      storageBucket: "webexample-cbd69.firebasestorage.app",
      messagingSenderId: "428607837147",
      appId: "1:428607837147:web:fc3bb2bd8c7905e846cdfe"
    };

      // Inicializar Firebase
      firebase.initializeApp(firebaseConfig);

      // Obtener la instancia de firestore
      const db = firebase.firestore();

      // Aplicar settings solo si no se han aplicado antes
      db.settings({ 
      experimentalForceLongPolling: true,
     merge: true // ESTO elimina la advertencia del log
    });
    </script>
  </head>

  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=1280 height=720 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">WebExample</div>
      </div>
    </div>

    <script>
      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/WebBuild.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/WebBuild.data.unityweb",
        frameworkUrl: buildUrl + "/WebBuild.framework.js.unityweb",
        codeUrl: buildUrl + "/WebBuild.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "WebExample",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      // Ajuste de tamaño para escritorio (720p)
      if (!/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        canvas.style.width = "1280px";
        canvas.style.height = "720px";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((instance) => {
          // EXPOSICIÓN GLOBAL PARA EL BRIDGE .JSLIB
          window.unityInstance = instance;
          document.querySelector("#unity-loading-bar").style.display = "none";
          document.querySelector("#unity-fullscreen-button").onclick = () => {
            window.unityInstance.SetFullscreen(1);
          };
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
